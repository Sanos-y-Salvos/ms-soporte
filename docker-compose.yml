services:
  ms-soporte:
    image: felruiz/ms-soporte:latest
    container_name: ms-soporte
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-ms_soporte}
      JWT_SECRET: ${JWT_SECRET:-6dcc110adf4dcde1015a418452ec8ca39780835ef83d28b13b165799a0525f264594d585080db90d09b8b9d4661507e40d67d5d2ae7673fb0b92719a18233213}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      GROQ_API_KEY: ${GROQ_API_KEY:-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}
      NODE_ENV: production
      TYPEORM_SYNCHRONIZE: "true"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sanos-network

  postgres:
    image: postgres:16-alpine
    container_name: ms-soporte-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-ms_soporte}
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-ms_soporte}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sanos-network

volumes:
  postgres_data:

networks:
  sanos-network:
    driver: bridge
