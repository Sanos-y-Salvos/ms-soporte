services:

  # ── Base de datos exclusiva de ms-soporte ────────────────────────────────────

  db-ms-soporte:
    container_name: ms-soporte-db
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-ms_soporte}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-ms_soporte}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ms_soporte_net # Aislada en su red privada
    restart: unless-stopped

  # ── ms-soporte ───────────────────────────────────────────────────────────────

  ms-soporte:
    container_name: ms-soporte
    #image: felruiz/ms-soporte:latest
    build:
      context: .
      dockerfile: Dockerfile
    #platform: linux/amd64
    ports:
      - "3005:3005" # Puerto actualizado a 3005
    environment:
      NODE_ENV: production
      PORT: 3005 # Puerto actualizado
      
      # PostgreSQL (Apunta al nombre del contenedor en la red privada)
      DB_HOST: db-ms-soporte
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-ms_soporte}
      
      # Variables propias de Soporte
      JWT_SECRET: ${JWT_SECRET:-6dcc110adf4dcde1015a418452ec8ca39780835ef83d28b13b165799a0525f264594d585080db90d09b8b9d4661507e40d67d5d2ae7673fb0b92719a18233213}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      TYPEORM_SYNCHRONIZE: "true"
      # Sin esta variable cae al fallback 'http://localhost:3001' del código,
      # que no resuelve dentro de la red Docker — debe apuntar al contenedor de ms-auth.
      MS_AUTH_URL: http://ms-auth:3001
      RESEND_API_KEY: ${RESEND_API_KEY:-re_f2GgvLj6_FbLp8cy2Bi4CYT5FkMCd6CbV}
    depends_on:
      db-ms-soporte:
        condition: service_healthy
    networks:
      - ms_soporte_net     # 1. Red privada para hablar con SU base de datos
      - sanos-y-salvos-net # 2. Red pública compartida (Gateway)
    restart: unless-stopped

# ── Volúmenes y red ──────────────────────────────────────────────────────────

volumes:
  db_data:

networks:
  ms_soporte_net:
    driver: bridge
    name: ms_soporte_net
  sanos-y-salvos-net:
    external: true
    name: mascotas_sanos-y-salvos-net